<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindView IT Services | Enterprise UKG Strategies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --font-heading: 'Space Grotesk', sans-serif;
        --font-body: 'Inter', sans-serif;
      }
      body {
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: var(--font-heading);
      }
      
      /* Utility Classes for Fonts */
      .font-heading {
        font-family: var(--font-heading);
      }
      .font-body, .font-sans {
        font-family: var(--font-body);
      }
      
      /* Mesh Gradient Animation */
      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      .animate-blob {
        animation: blob 7s infinite;
      }
      .animation-delay-2000 {
        animation-delay: 2s;
      }
      .animation-delay-4000 {
        animation-delay: 4s;
      }

      /* Float Animation */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }

      /* Breathe Animation (Premium Icons) - Opacity Pulse */
      @keyframes breathe {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.90; transform: scale(1.02); }
      }
      .animate-breathe {
        animation: breathe 4s ease-in-out infinite;
      }

      /* Breathe Subtle */
      @keyframes breathe-subtle {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.9; }
      }
      .animate-breathe-subtle {
        animation: breathe-subtle 4s ease-in-out infinite;
      }
      
      /* Animated Gradient Background for USP Icons */
      @keyframes gradient-pan {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .animate-gradient-pan {
        background-size: 200% 200%;
        animation: gradient-pan 5s ease-in-out infinite;
      }

      /* Enhanced Entrance Animation for USP Cards */
      @keyframes card-enter {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-card-enter {
        animation: card-enter 600ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }

      /* NEW Exit Animation for USP Cards on Tab Switch */
      @keyframes card-exit {
        to {
          opacity: 0;
          transform: translateY(10px);
        }
      }
      .animate-card-exit {
        /* 'forwards' is crucial to keep the element hidden after animating */
        animation: card-exit 200ms ease-in forwards;
      }

      /* Dynamic Breathing Background Animations for USP Icons (Glass Version) */
      @keyframes breath-glass {
        0%, 100% { 
          background-color: rgba(255, 255, 255, 0.2); 
          border-color: rgba(255, 255, 255, 0.3);
          box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
          transform: translateY(0);
        }
        50% { 
          background-color: rgba(255, 255, 255, 0.25); 
          border-color: rgba(255, 255, 255, 0.5); 
          box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
          transform: translateY(-2px);
        }
      }
      .animate-breath-glass {
        animation: breath-glass 4s ease-in-out infinite;
      }
      
      /* Custom Scrollbar for Modal */
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

    </style>
</head>
  <body class="bg-slate-50 text-slate-900 antialiased selection:bg-[#ad577b]/20 selection:text-[#853856]">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
